<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日占い　クイックタロット</title>
    <style>
        :root { --main-bg: #0f0f1e; --card-bg: #16213e; --accent: #e94560; --text: #ffffff; --disabled: #444; --gold: #d4af37; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--main-bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; min-height: 100vh; }
        h1 { font-size: 1.5rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); margin-bottom: 20px; }
        
        .setup-section { width: 100%; max-width: 450px; text-align: center; }
        select, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: linear-gradient(45deg, var(--accent), #ff6b6b); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        button:disabled { background: var(--disabled); cursor: not-allowed; box-shadow: none; opacity: 0.6; }

        /* デッキエリア */
        #deck-container { 
            position: relative; 
            width: 100%; 
            height: 450px; 
            margin: 20px 0; 
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-back { 
            position: absolute; 
            width: 90px; 
            height: 155px; 
            background-image: url('裏面.png'); /* 裏面画像を使用 */
            background-size: cover;
            background-position: center;
            border: 1px solid var(--gold); 
            border-radius: 8px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* シャッフルアニメーション[cite: 1] */
        .shuffling { 
            animation: dramaticShuffle 0.7s ease-in-out infinite;
        }

        @keyframes dramaticShuffle {
            0% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
            25% { transform: translate(-160px, -40px) rotate(-110deg) scale(1.2); z-index: 50; }
            50% { transform: translate(0, -100px) rotate(-220deg) scale(0.8); z-index: 10; }
            75% { transform: translate(160px, -40px) rotate(-330deg) scale(1.2); z-index: 50; }
            100% { transform: translate(0, 0) rotate(-450deg) scale(1.1); }
        }

        /* 結果エリア */
        #result-area { display: none; text-align: center; width: 100%; max-width: 400px; }
        .card-container { 
            width: 240px; 
            height: 410px; 
            margin: 20px auto; 
            position: relative;
            animation: cardReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 決定時の発光エフェクト */
        .card-container::after {
            content: "";
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(233,69,96,0) 70%);
            z-index: -1;
            animation: glowPulse 2s ease-out;
        }

        @keyframes glowPulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        #card-image { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 4px solid #fff; box-shadow: 0 0 50px rgba(233, 69, 96, 0.8); }
        .reverse { transform: rotate(180deg); }
        
        @keyframes cardReveal {
            0% { transform: scale(0.2) rotateY(180deg); opacity: 0; filter: brightness(3); }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; filter: brightness(1); }
        }

        .diagnosis-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 6px solid var(--accent); text-align: left; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        #limit-msg { color: #ff9999; font-size: 0.85rem; margin-top: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔮 神秘のタロット占い</h1>

    <div class="setup-section">
        <label for="category">運命を知りたい項目を選択してください</label>
        <select id="category" onchange="checkLimit()">
            <option value="恋愛">恋愛</option>
            <option value="仕事">仕事</option>
            <option value="健康">健康</option>
            <option value="家族">家族</option>
            <option value="交友関係">交友関係</option>
            <option value="ギャンブル">ギャンブル</option>
        </select>
        <div id="limit-msg">本日の予言は既に授けられました。明日またお越しください。</div>
        
        <div id="deck-container"></div>
        
        <button id="draw-btn" onclick="startShuffle()">運命をシャッフルする</button>
    </div>

    <div id="result-area">
        <h2 id="result-title" style="color: var(--gold);"></h2>
        <div class="card-container">
            <img id="card-image" src="" alt="タロットカード">
        </div>
        <div class="diagnosis-box">
            <p id="diagnosis-text" style="font-size: 1.1rem; line-height: 1.6;"></p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <small id="advice-text" style="color: var(--gold); font-weight: bold;"></small>
        </div>
        <button onclick="location.reload()" style="background:none; border:2px solid var(--accent); color: var(--accent); box-shadow: none;">神託を終える</button>
    </div>

    <script>
        const tarotData = {
            "愚者": "自由、始まり、冒険心", "魔術師": "創造、才能、自信", "女教皇": "直感、知恵、静寂",
            "女帝": "豊穣、愛情、実り", "皇帝": "責任、支配、安定", "教皇": "慈悲、伝統、信頼",
            "恋人": "選択、調和、ときめき", "戦車": "勝利、前進、強い意志", "正義": "公平、決断、誠実",
            "隠者": "内省、真理、慎重さ", "運命の輪": "好転、チャンス、幸運", "力": "勇気、忍耐、克己心",
            "吊るされた男": "献身、視点の転換、忍耐", "死神": "終焉、再出発、劇的変化", "節制": "調和、節度、癒やし",
            "悪魔": "誘惑、執着、束縛", "塔": "覚醒、衝撃、既成概念の崩壊", "星": "希望、理想、インスピレーション",
            "月": "潜在意識、不安、神秘", "太陽": "成功、輝き、圧倒的な活力", "審判": "復活、覚醒、結果の到来", "世界": "完成、成就、大団円"
        };
        const cardNames = Object.keys(tarotData);

        window.onload = () => {
            createDeck();
            checkLimit();
        };

        function createDeck() {
            const container = document.getElementById('deck-container');
            container.innerHTML = '';
            for (let i = 0; i < 22; i++) {
                const card = document.createElement('div');
                card.className = 'card-back';
                const angle = (i - 10.5) * 6; 
                const x = (i - 10.5) * 16;
                card.style.transform = `translateX(${x}px) rotate(${angle}deg)`;
                card.style.zIndex = i;
                container.appendChild(card);
            }
        }

        function checkLimit() {
            const category = document.getElementById('category').value;
            const lastDate = localStorage.getItem('tarot_' + category);
            const isLimited = lastDate === new Date().toLocaleDateString();
            document.getElementById('draw-btn').disabled = isLimited;
            document.getElementById('limit-msg').style.display = isLimited ? 'block' : 'none';
            document.getElementById('deck-container').style.opacity = isLimited ? '0.3' : '1';
        }

        function startShuffle() {
            const btn = document.getElementById('draw-btn');
            btn.disabled = true;

            const cards = document.querySelectorAll('.card-back');
            cards.forEach((card, index) => {
                // 一度中央にギュッと集める演出
                card.style.transform = `translate(0, 0) rotate(0deg) scale(1.1)`;
                setTimeout(() => {
                    card.classList.add('shuffling');
                }, 400 + (index * 15));
            });

            setTimeout(drawCard, 2800);
        }

        function drawCard() {
            const category = document.getElementById('category').value;
            const cardName = cardNames[Math.floor(Math.random() * cardNames.length)];
            const isReverse = Math.random() < 0.5;

            localStorage.setItem('tarot_' + category, new Date().toLocaleDateString());

            document.querySelector('.setup-section').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            document.getElementById('result-title').innerText = `${cardName} — ${isReverse ? '逆位置' : '正位置'}`;
            document.getElementById('diagnosis-text').innerText = `${category}の運命：\nこのカードは「${tarotData[cardName]}」を象徴しています。`;
            
            const imgElement = document.getElementById('card-image');
            imgElement.src = `${cardName}.png`;
            
            const advice = document.getElementById('advice-text');
            if (isReverse) {
                imgElement.classList.add('reverse');
                advice.innerText = "【啓示】現在は足元を見つめ直すべき時。急がず、内なる声に耳を傾けてください。";
            } else {
                imgElement.classList.remove('reverse');
                advice.innerText = "【神託】追い風が吹いています。自分の可能性を信じ、光差す方向へ進んでください。";
            }
        }
    </script>
</body>
</html>
