function createDeck() {

    const container = document.getElementById('deck-container');

    for(let i=0;i<22;i++) {

        const card = document.createElement('div');

        card.className = 'card-back';

        const angle = (i - 11) * 5;
        const x = (i - 11) * 12;

        card.style.transform = `translateX(${x}px) rotate(${angle}deg)`;

        card.style.zIndex = i;

        container.appendChild(card);
    }
}

}
