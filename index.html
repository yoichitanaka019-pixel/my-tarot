<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動作修正版タロット占い</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1020;
color:#fff;
display:flex;
justify-content:center;
padding:20px;
}

.app{
width:100%;
max-width:500px;
}

h1{
text-align:center;
color:#d4af37;
}

.panel{
background:#151c33;
padding:20px;
border-radius:16px;
}

select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#8b5cf6;
color:#fff;
cursor:pointer;
}

#deck{
height:220px;
position:relative;
margin-top:20px;
}

.card-back{
position:absolute;
width:70px;
height:120px;
background:linear-gradient(135deg,#333,#666);
border:2px solid gold;
border-radius:10px;
left:50%;
top:50%;
transform-origin:center bottom;
}

#result{
display:none;
margin-top:20px;
}

#tarot-card{
height:320px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
text-align:center;
padding:20px;
background:linear-gradient(135deg,#1f2937,#4c1d95);
border:3px solid gold;
box-shadow:0 0 30px rgba(212,175,55,.5);
}

.reverse{
transform:rotate(180deg);
}

.textbox{
margin-top:20px;
background:#111827;
padding:20px;
border-radius:14px;
line-height:1.8;
}

#advice{
color:#ffe58f;
font-weight:bold;
display:block;
margin-top:16px;
}

</style>
</head>
<body>

<div class="app">

<h1>✦ タロット神託 ✦</h1>

<div class="panel" id="setup">

<select id="category">
<option>恋愛</option>
<option>仕事</option>
<option>健康</option>
<option>家族</option>
<option>交友関係</option>
<option>ギャンブル</option>
</select>

<div id="deck"></div>

<button onclick="startFortune()" id="drawBtn">
運命を占う
</button>

</div>

<div id="result">

<div id="tarot-card"></div>

<div class="textbox">
<h2 id="title"></h2>
<p id="message"></p>
<small id="advice"></small>
</div>

<button onclick="resetFortune()">
もう一度占う
</button>

</div>

</div>

<script>

const cards = [
"愚者","魔術師","女教皇","女帝","皇帝","教皇","恋人","戦車","正義","隠者",
"運命の輪","力","吊るされた男","死神","節制","悪魔","塔","星","月","太陽","審判","世界"
];

const messages = {
"愚者":{
"正位置":["新しい冒険が始まります。","直感を信じましょう。"],
"逆位置":["軽率な判断に注意。","焦らず慎重に。"]
},
"魔術師":{
"正位置":["才能が開花します。","自信を持って進みましょう。"],
"逆位置":["迷いが力を鈍らせています。","集中力を取り戻して。"]
},
"女教皇":{
"正位置":["直感が冴えています。","静かな時間を大切に。"],
"逆位置":["誤解や混乱に注意。","冷静さを忘れずに。"]
},
"女帝":{
"正位置":["愛情運が高まっています。","豊かさを受け取って。"],
"逆位置":["甘えすぎに注意。","自立心を持ちましょう。"]
},
"皇帝":{
"正位置":["強い意志が成功を導きます。","責任感を持って行動を。"],
"逆位置":["頑固さが障害になります。","柔軟性を意識して。"]
},
"教皇":{
"正位置":["信頼できる導きがあります。","誠実さが鍵です。"],
"逆位置":["古い価値観に縛られています。","視野を広げてください。"]
},
"恋人":{
"正位置":["心を動かす出会いの予感。","本音を大切に。"],
"逆位置":["迷いが関係を乱します。","曖昧な態度を避けましょう。"]
},
"戦車":{
"正位置":["勢いが成功を呼びます。","前進あるのみ。"],
"逆位置":["焦りが失敗を招きます。","落ち着きを取り戻して。"]
},
"正義":{
"正位置":["公平な結果が訪れます。","誠実な選択を。"],
"逆位置":["偏った判断に注意。","客観性を大切に。"]
},
"隠者":{
"正位置":["内省が答えを導きます。","静かな時間を。"],
"逆位置":["孤立しやすい時期です。","誰かに相談を。"]
},
"運命の輪":{
"正位置":["幸運の流れが来ています。","チャンスを掴んで。"],
"逆位置":["停滞の時期です。","焦らず待ちましょう。"]
},
"力":{
"正位置":["精神力が試されています。","感情を制御しましょう。"],
"逆位置":["不安が強くなっています。","休息も必要です。"]
},
"吊るされた男":{
"正位置":["忍耐が未来を変えます。","視点を変えてみましょう。"],
"逆位置":["停滞感があります。","執着を手放して。"]
},
"死神":{
"正位置":["大きな転換点です。","変化を受け入れて。"],
"逆位置":["過去への執着があります。","新しい未来へ進んで。"]
},
"節制":{
"正位置":["調和が運を安定させます。","バランスを意識して。"],
"逆位置":["極端な行動に注意。","生活を整えましょう。"]
},
"悪魔":{
"正位置":["誘惑に注意が必要です。","冷静さを保って。"],
"逆位置":["束縛から解放されます。","勇気を出してください。"]
},
"塔":{
"正位置":["衝撃的な変化があります。","崩壊を恐れないで。"],
"逆位置":["問題の先送りに注意。","現実と向き合って。"]
},
"星":{
"正位置":["希望が未来を照らします。","夢を諦めないで。"],
"逆位置":["失望しやすい時期です。","小さな希望を大切に。"]
},
"月":{
"正位置":["不安が強まりやすい時。","直感を信じて。"],
"逆位置":["真実が見えてきます。","現実を受け入れて。"]
},
"太陽":{
"正位置":["最高の幸運期です。","自信を持ちましょう。"],
"逆位置":["慢心に注意。","感謝を忘れずに。"]
},
"審判":{
"正位置":["努力が報われます。","結果を受け入れて。"],
"逆位置":["未練が残っています。","決断を先延ばしにしないで。"]
},
"世界":{
"正位置":["願いが成就します。","達成を受け取って。"],
"逆位置":["あと一歩で停滞しています。","最後まで気を抜かずに。"]
}
};

function createDeck(){
const deck = document.getElementById("deck");
deck.innerHTML = "";

for(let i=0;i<22;i++){
const card = document.createElement("div");
card.className = "card-back";
card.style.transform =
`translate(-50%, -50%) rotate(${(i-11)*5}deg) translateY(${Math.abs(i-11)*2}px)`;
deck.appendChild(card);
}
}

createDeck();

function startFortune(){

document.getElementById("drawBtn").disabled = true;

setTimeout(()=>{

const card =
cards[Math.floor(Math.random()*cards.length)];

const reverse =
Math.random() < 0.5;

const pos =
reverse ? "逆位置" : "正位置";

const category =
document.getElementById("category").value;

const data =
messages[card][pos];

document.getElementById("setup").style.display="none";
document.getElementById("result").style.display="block";

const tarot = document.getElementById("tarot-card");

tarot.className = "";

if(reverse){
tarot.classList.add("reverse");
}

tarot.innerHTML =
`${card}<br>${pos}`;

document.getElementById("title").innerText =
`${category} の神託`;

document.getElementById("message").innerText =
data[0];

document.getElementById("advice").innerText =
`【啓示】${data[1]}`;

},1500);

}

function resetFortune(){

document.getElementById("result").style.display="none";
document.getElementById("setup").style.display="block";
document.getElementById("drawBtn").disabled = false;

createDeck();

}

</script>

</body>
</html>
