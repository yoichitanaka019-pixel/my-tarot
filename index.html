<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極タロット神託</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Yu Gothic",sans-serif;
background:
radial-gradient(circle at top,#1c2455 0%,#050816 65%);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
color:white;
overflow-x:hidden;
}

.app{
width:100%;
max-width:560px;
}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(10px);
border-radius:28px;
padding:28px;
box-shadow:
0 0 40px rgba(0,0,0,.5),
0 0 60px rgba(139,92,246,.15);
}

.title{
text-align:center;
font-size:2rem;
margin-bottom:20px;
color:#f5d76e;
text-shadow:0 0 20px rgba(245,215,110,.7);
}

#deck{
position:relative;
height:260px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card-back{
position:absolute;
width:82px;
height:145px;
border-radius:14px;

/* 重要修正:
   back.png が無くても表示崩れしない */
background:
linear-gradient(135deg,#f5e7b2 0%,#cfb15b 30%,#7a5f1c 100%);

border:2px solid #ffd700;

box-shadow:
0 0 14px rgba(255,215,0,.55),
0 0 28px rgba(255,215,0,.25);

overflow:hidden;
}

.card-back::before{
content:"✦";
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
color:rgba(0,0,0,.45);
}

.magic-chaos{
animation:magicChaos 4s ease-in-out infinite;
}

@keyframes magicChaos{

0%{
transform:
translate(0,0)
rotate(0deg)
scale(.5);
opacity:0;
}

25%{
opacity:1;
transform:
translate(var(--x1),var(--y1))
rotate(var(--r1))
scale(1);
}

50%{
transform:
translate(var(--x2),var(--y2))
rotate(var(--r2))
scale(1.15);
}

75%{
transform:
translate(var(--x3),var(--y3))
rotate(var(--r3))
scale(1);
}

100%{
transform:
translate(var(--x4),var(--y4))
rotate(var(--r4))
scale(.7);
opacity:.25;
}

}

button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:16px;
font-size:1.15rem;
font-weight:bold;
cursor:pointer;
color:white;

background:
linear-gradient(90deg,#7c3aed,#ec4899);

box-shadow:
0 10px 30px rgba(236,72,153,.35);

transition:.3s;
}

button:hover{
transform:translateY(-2px) scale(1.01);
}

#result{
display:none;
margin-top:24px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#card-image{
width:min(84vw,340px);
display:block;
margin:auto;
border-radius:20px;
border:3px solid gold;
background:#000;
box-shadow:
0 0 40px rgba(255,215,0,.45);
}

.reverse{
transform:rotate(180deg);
}

#message{
margin-top:22px;
padding:24px;
border-radius:20px;

background:
rgba(0,0,0,.35);

line-height:1.95;
font-size:1.02rem;

box-shadow:
inset 0 0 20px rgba(255,255,255,.03);
}

.notice{
margin-top:14px;
font-size:.9rem;
opacity:.75;
text-align:center;
line-height:1.6;
}

@media(max-width:768px){

body{
padding:14px;
}

.title{
font-size:1.7rem;
}

.card-back{
width:68px;
height:120px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="panel" id="panel">

<h1 class="title">✦ 究極タロット神託 ✦</h1>

<div id="deck"></div>

<button onclick="startFortune()" id="drawBtn">
運命を占う
</button>

<div class="notice">
カード画像は<br>
cards フォルダ内から読み込まれます
</div>

</div>

<div id="result">

<img id="card-image">

<div id="message"></div>

<button onclick="resetFortune()">
もう一度占う
</button>

</div>

</div>

<script>

const cards = [

{id:"fool",name:"愚者"},
{id:"magician",name:"魔術師"},
{id:"priestess",name:"女教皇"},
{id:"empress",name:"女帝"},
{id:"emperor",name:"皇帝"},
{id:"hierophant",name:"教皇"},
{id:"lovers",name:"恋人"},
{id:"chariot",name:"戦車"},
{id:"justice",name:"正義"},
{id:"hermit",name:"隠者"},
{id:"wheel",name:"運命の輪"},
{id:"strength",name:"力"},
{id:"hangedman",name:"吊るされた男"},
{id:"death",name:"死神"},
{id:"temperance",name:"節制"},
{id:"devil",name:"悪魔"},
{id:"tower",name:"塔"},
{id:"star",name:"星"},
{id:"moon",name:"月"},
{id:"sun",name:"太陽"},
{id:"judgement",name:"審判"},
{id:"world",name:"世界"}

];

function rand(min,max){
return Math.floor(Math.random()*(max-min)+min);
}

function createDeck(){

const deck=document.getElementById("deck");

deck.innerHTML="";

for(let i=0;i<22;i++){

const card=document.createElement("div");

card.className="card-back";

card.style.left="45%";
card.style.top="25%";

card.style.transform=
`rotate(${(i-11)*4}deg)`;

deck.appendChild(card);

}

}

createDeck();

function startFortune(){

document.getElementById("drawBtn").disabled=true;

const all=document.querySelectorAll(".card-back");

all.forEach(card=>{

card.classList.add("magic-chaos");

card.style.setProperty("--x1",rand(-140,140)+"px");
card.style.setProperty("--y1",rand(-100,100)+"px");
card.style.setProperty("--r1",rand(-180,180)+"deg");

card.style.setProperty("--x2",rand(-180,180)+"px");
card.style.setProperty("--y2",rand(-120,120)+"px");
card.style.setProperty("--r2",rand(-260,260)+"deg");

card.style.setProperty("--x3",rand(-190,190)+"px");
card.style.setProperty("--y3",rand(-130,130)+"px");
card.style.setProperty("--r3",rand(-360,360)+"deg");

card.style.setProperty("--x4",rand(-210,210)+"px");
card.style.setProperty("--y4",rand(-150,150)+"px");
card.style.setProperty("--r4",rand(-540,540)+"deg");

});

setTimeout(drawCard,4000);

}

function drawCard(){

const selected=
cards[Math.floor(Math.random()*cards.length)];

const reverse=
Math.random()<0.5;

document.getElementById("panel").style.display="none";

document.getElementById("result").style.display="block";

const img=document.getElementById("card-image");

img.className="";

img.src=
"cards/"+selected.id+".png";

/* 重要修正:
   画像が無い場合でも
   壊れた画像アイコンを出さない */
img.onerror=function(){

this.style.display="none";

document.getElementById("message").innerHTML=
"<h2>"+selected.name+"</h2><br>" +
"カード画像が見つかりません。<br><br>" +
"cards/"+selected.id+".png を配置してください。";

};

img.onload=function(){

this.style.display="block";

};

if(reverse){

img.classList.add("reverse");

}

document.getElementById("message").innerHTML=
"<h2>"+selected.name+
(reverse ? "（逆位置）" : "（正位置）")+
"</h2><br><br>" +
selected.name+
" があなたへ重要な神託を示しています。";

}

function resetFortune(){

document.getElementById("result").style.display="none";

document.getElementById("panel").style.display="block";

document.getElementById("drawBtn").disabled=false;

createDeck();

}

</script>

</body>
</html>
