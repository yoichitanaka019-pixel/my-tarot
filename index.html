# 究極版タロット占いサイト（完全強化版）

以下は、あなたの既存サイトを大幅強化するための完全実装ガイドです。

---

# 実装内容

## ✅ 実装済み要素

* 全22枚対応
* 正位置 / 逆位置対応
* 6カテゴリ対応
* カードごとの専用文章
* 高級感UI
* スマホ最適化
* 神秘的アニメーション
* 強化シャッフル
* カード発光演出
* 背景パーティクル
* カード別演出
* 没入型デザイン

---

# 完全版コード

以下をHTMLファイルとして保存してください。

```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極タロット神託</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #060816;
    --gold: #d4af37;
    --gold-light: #ffe58f;
    --accent: #8b5cf6;
    --card-bg: rgba(20,20,40,0.75);
    --text: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    background:
        radial-gradient(circle at top, #1a1f4c 0%, #060816 60%),
        #060816;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    position: relative;
}

/* 星背景 */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
    background-size: 120px 120px;
    background-position: 0 0, 60px 60px;
    opacity: 0.08;
    animation: starsMove 60s linear infinite;
    pointer-events: none;
}

@keyframes starsMove {
    from { transform: translateY(0); }
    to { transform: translateY(-120px); }
}

h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    margin-top: 10px;
    margin-bottom: 20px;
    color: var(--gold);
    text-shadow:
        0 0 10px rgba(212,175,55,0.7),
        0 0 25px rgba(212,175,55,0.4);
    letter-spacing: 2px;
    text-align: center;
}

.setup-section {
    width: 100%;
    max-width: 500px;
    text-align: center;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

label {
    display: block;
    margin-bottom: 12px;
    font-size: 1.1rem;
}

select,
button {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    margin-top: 12px;
    font-size: 1rem;
}

select {
    background: rgba(255,255,255,0.08);
    color: white;
}

button {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 25px rgba(139,92,246,0.5);
}

button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 0 35px rgba(236,72,153,0.7);
}

#deck-container {
    position: relative;
    width: 100%;
    height: 340px;
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 2000px;
}

.card-back {
    position: absolute;
    width: 88px;
    height: 150px;
    border-radius: 12px;
    background-image: url('裏面.png');
    background-size: cover;
    border: 2px solid rgba(212,175,55,0.6);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.8s cubic-bezier(.2,.8,.2,1);
}

.shuffling {
    animation: mysticShuffle 0.7s ease-in-out infinite;
}

@keyframes mysticShuffle {
    0% {
        transform: translate(0,0) rotate(0deg) scale(1);
    }
    25% {
        transform: translate(-180px,-50px) rotate(-90deg) scale(1.2);
    }
    50% {
        transform: translate(0,-100px) rotate(-180deg) scale(0.85);
    }
    75% {
        transform: translate(180px,-50px) rotate(-270deg) scale(1.2);
    }
    100% {
        transform: translate(0,0) rotate(-360deg) scale(1);
    }
}

#result-area {
    display: none;
    width: 100%;
    max-width: 550px;
    text-align: center;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-container {
    width: min(80vw, 280px);
    margin: 30px auto;
    position: relative;
}

.card-container::before {
    content: "";
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(212,175,55,0.5), transparent 70%);
    animation: pulse 3s infinite;
    z-index: -1;
}

@keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.7; }
}

#card-image {
    width: 100%;
    border-radius: 18px;
    border: 3px solid var(--gold);
    box-shadow:
        0 0 20px rgba(212,175,55,0.5),
        0 0 60px rgba(139,92,246,0.4);
}

.reverse {
    transform: rotate(180deg);
}

.diagnosis-box {
    background: rgba(10,10,20,0.7);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    line-height: 1.9;
    font-size: 1.05rem;
    text-align: left;
    box-shadow: 0 0 40px rgba(0,0,0,0.45);
}

#advice-text {
    display: block;
    margin-top: 18px;
    color: var(--gold-light);
    font-weight: bold;
}

.special-sun {
    animation: sunGlow 2s infinite alternate;
}

@keyframes sunGlow {
    from {
        filter: brightness(1);
    }
    to {
        filter: brightness(1.4);
    }
}

.special-moon {
    animation: moonFloat 4s ease-in-out infinite;
}

@keyframes moonFloat {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

.special-death {
    animation: deathPulse 1s infinite alternate;
}

@keyframes deathPulse {
    from {
        filter: hue-rotate(0deg);
    }
    to {
        filter: hue-rotate(40deg);
    }
}

@media (max-width: 768px) {
    body {
        padding: 14px;
    }

    .setup-section {
        padding: 18px;
    }

    #deck-container {
        height: 260px;
    }

    .card-back {
        width: 64px;
        height: 108px;
    }

    .diagnosis-box {
        font-size: 0.96rem;
        line-height: 1.8;
    }
}
</style>
</head>

<body>

<h1>✦ 究極タロット神託 ✦</h1>

<div class="setup-section">

<label>占いたい運命を選択してください</label>

<select id="category">
<option value="恋愛">恋愛</option>
<option value="仕事">仕事</option>
<option value="健康">健康</option>
<option value="家族">家族</option>
<option value="交友関係">交友関係</option>
<option value="ギャンブル">ギャンブル</option>
</select>

<div id="deck-container"></div>

<button onclick="startShuffle()">運命を解放する</button>

</div>

<div id="result-area">

<h2 id="result-title"></h2>

<div class="card-container">
<img id="card-image">
</div>

<div class="diagnosis-box">
<p id="diagnosis-text"></p>
<small id="advice-text"></small>
</div>

<button onclick="location.reload()" style="margin-top:20px; background:transparent; border:1px solid gold;">
再び神託を受ける
</button>

</div>

<script>

const cards = [
"愚者","魔術師","女教皇","女帝","皇帝","教皇","恋人","戦車","正義","隠者",
"運命の輪","力","吊るされた男","死神","節制","悪魔","塔","星","月","太陽","審判","世界"
];

const categories = ["恋愛","仕事","健康","家族","交友関係","ギャンブル"];

const baseMessages = {
    正位置: {
        text: "運命の流れはあなたに追い風を与えています。大きな転機が近づいています。",
        advice: "恐れず前進してください。"
    },
    逆位置: {
        text: "停滞や迷いが見えます。焦るほど運命は遠ざかります。",
        advice: "今は慎重な判断を。"
    }
};

const specialTexts = {
    "愚者": "新しい旅立ちが始まります。",
    "魔術師": "才能が目覚める時です。",
    "女教皇": "直感が真実を見抜きます。",
    "女帝": "豊かさと愛情に満たされます。",
    "皇帝": "責任と支配力が試されます。",
    "教皇": "導き手との縁が深まります。",
    "恋人": "心を揺さぶる選択が訪れます。",
    "戦車": "勢いが勝利へ繋がります。",
    "正義": "公平な結果が下されます。",
    "隠者": "内なる真実を探す時です。",
    "運命の輪": "大きな幸運の波が到来します。",
    "力": "精神力が運命を切り開きます。",
    "吊るされた男": "忍耐が未来を変えます。",
    "死神": "終わりと再生の転換点です。",
    "節制": "調和が運命を安定させます。",
    "悪魔": "誘惑に支配されやすい時期です。",
    "塔": "衝撃的な真実が明らかになります。",
    "星": "希望が未来を照らします。",
    "月": "不安と幻想に惑わされます。",
    "太陽": "強力な成功運が訪れます。",
    "審判": "過去の結果が現れます。",
    "世界": "願望成就の時が来ました。"
};

window.onload = () => {
    createDeck();
};

function createDeck() {

    const container = document.getElementById('deck-container');

    for(let i=0;i<22;i++) {

        const card = document.createElement('div');

        card.className = 'card-back';

        const angle = (i - 11) * 5;
        const x = (i - 11) * 12;

        card.style.transform = `translateX(${x}px) rotate(${angle}deg)`;

        card.style.zIndex = i;

        container.appendChild(card);
    }
}

function startShuffle() {

    const all = document.querySelectorAll('.card-back');

    all.forEach((c, i) => {

        c.classList.add('shuffling');

        c.style.animationDelay = `${i * 0.03}s`;
    });

    setTimeout(drawCard, 3200);
}

function drawCard() {

    const category = document.getElementById('category').value;

    const card = cards[Math.floor(Math.random()*cards.length)];

    const reverse = Math.random() < 0.5;

    const position = reverse ? '逆位置' : '正位置';

    document.querySelector('.setup-section').style.display = 'none';

    document.getElementById('result-area').style.display = 'block';

    document.getElementById('result-title').innerText = `${card} — ${position}`;

    const data = baseMessages[position];

    const categoryMessage = {
        恋愛: '感情の流れが強く動いています。',
        仕事: '環境変化が訪れる兆しがあります。',
        健康: '生活習慣の見直しが鍵になります。',
        家族: '身近な人との関係が運命を左右します。',
        交友関係: '人間関係の変化が訪れそうです。',
        ギャンブル: '直感と冷静さの両立が必要です。'
    };

    document.getElementById('diagnosis-text').innerText =
        `${specialTexts[card]}\n\n${categoryMessage[category]}\n\n${data.text}`;

    document.getElementById('advice-text').innerText =
        `【神託】${data.advice}`;

    const img = document.getElementById('card-image');

    img.src = `${card}.png`;

    if(reverse) {
        img.classList.add('reverse');
    }

    if(card === '太陽') {
        img.classList.add('special-sun');
    }

    if(card === '月') {
        img.classList.add('special-moon');
    }

    if(card === '死神') {
        img.classList.add('special-death');
    }
}

</script>

</body>
</html>
