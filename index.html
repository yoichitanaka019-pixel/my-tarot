<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘のタロット占い</title>
    <style>
        :root { --main-bg: #0f0f1e; --card-bg: #16213e; --accent: #e94560; --text: #ffffff; --disabled: #444; --gold: #d4af37; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--main-bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; min-height: 100vh; }
        h1 { font-size: 1.5rem; color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin-bottom: 20px; }
        .setup-section { width: 100%; max-width: 450px; text-align: center; }
        select, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: linear-gradient(45deg, var(--accent), #ff6b6b); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        button:disabled { background: var(--disabled); cursor: not-allowed; box-shadow: none; }

        #deck-container { position: relative; width: 100%; height: 450px; margin: 20px 0; perspective: 1200px; display: flex; justify-content: center; align-items: center; }
        .card-back { 
            position: absolute; width: 90px; height: 155px; 
            background-image: url('裏面.png'); background-size: cover; background-position: center;
            border: 1px solid var(--gold); border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .shuffling { animation: dramaticShuffle 0.8s ease-in-out infinite; }
        @keyframes dramaticShuffle {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(-150px, -50px) rotate(-120deg) scale(1.1); z-index: 30; }
            50% { transform: translate(0, -120px) rotate(-240deg) scale(0.9); z-index: 10; }
            75% { transform: translate(150px, -50px) rotate(-360deg) scale(1.1); z-index: 30; }
            100% { transform: translate(0, 0) rotate(-480deg) scale(1); }
        }

        #result-area { display: none; text-align: center; width: 100%; max-width: 400px; }
        .card-container { width: 240px; height: 410px; margin: 20px auto; animation: cardReveal 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
        #card-image { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 4px solid #fff; box-shadow: 0 0 40px rgba(233, 69, 96, 0.7); }
        .reverse { transform: rotate(180deg); }
        @keyframes cardReveal {
            0% { transform: translateY(100px) rotateY(90deg) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) rotateY(0deg) scale(1); opacity: 1; }
        }

        .diagnosis-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 6px solid var(--accent); text-align: left; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #limit-msg { color: #ff9999; font-size: 0.85rem; margin-top: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔮 神秘のタロット占い</h1>

    <div class="setup-section">
        <label for="category">運命を知りたい項目を選択してください</label>
        <select id="category" onchange="checkLimit()">
            <option value="恋愛">恋愛</option>
            <option value="仕事">仕事</option>
            <option value="健康">健康</option>
            <option value="家族">家族</option>
            <option value="交友関係">交友関係</option>
            <option value="ギャンブル">ギャンブル</option>
        </select>
        <div id="limit-msg">本日の予言は既に授けられました。明日またお越しください。</div>
        <div id="deck-container"></div>
        <button id="draw-btn" onclick="startDramaticShuffle()">運命をシャッフルする</button>
    </div>

    <div id="result-area">
        <h2 id="result-title"></h2>
        <div class="card-container">
            <img id="card-image" src="" alt="タロットカード">
        </div>
        <div class="diagnosis-box">
            <p id="diagnosis-text" style="font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap;"></p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <small id="advice-text" style="color: var(--gold); font-weight: bold;"></small>
        </div>
        <button onclick="location.reload()" style="background:none; border:2px solid var(--accent); color: var(--accent); box-shadow: none;">神託を終える</button>
    </div>

    <script>
        // 効果音の設定[cite: 1]
        const shuffleSound = new Audio('shuffle.mp3');
        const revealSound = new Audio('reveal.mp3');

        const tarotData = {
            "愚者": "自由、始まり、冒険心", "魔術師": "創造、才能、自信", "女教皇": "直感、知恵、静寂",
            "女帝": "豊穣、愛情、実り", "皇帝": "責任、支配、安定", "教皇": "慈悲、連帯、伝統",
            "恋人": "選択、調和、ときめき", "戦車": "勝利、前進、強い意志", "正義": "公平、決断、誠実",
            "隠者": "内省、真理、慎重さ", "運命の輪": "好転、チャンス、幸運", "力": "勇気、忍耐、克己心",
            "吊るされた男": "献身、視点の転換、忍耐", "死神": "終焉、再出発、劇的変化", "節制": "調和、節度、癒やし",
            "悪魔": "誘惑、執着、束縛", "塔": "覚醒、衝撃、既成概念の崩壊", "星": "希望、理想、インスピレーション",
            "月": "潜在意識、不安、神秘", "太陽": "成功、輝き、圧倒的な活力", "審判": "復活、覚醒、結果の到来", "世界": "完成、成就、大団円"
        };
        const cardNames = Object.keys(tarotData);
        const deckContainer = document.getElementById('deck-container');

        window.onload = () => {
            createInitialDeck();
            checkLimit();
        };

        function createInitialDeck() {
            deckContainer.innerHTML = '';
            for (let i = 0; i < 22; i++) {
                const card = document.createElement('div');
                card.className = 'card-back';
                const angle = (i - 10.5) * 7; 
                const x = (i - 10.5) * 18;
                const y = Math.abs(i - 10.5) * 2;
                card.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${angle}deg)`;
                card.style.zIndex = i;
                deckContainer.appendChild(card);
            }
        }

        function checkLimit() {
            const category = document.getElementById('category').value;
            const lastDate = localStorage.getItem('tarot_' + category);
            if (lastDate === new Date().toLocaleDateString()) {
                document.getElementById('draw-btn').disabled = true;
                document.getElementById('limit-msg').style.display = 'block';
                deckContainer.style.filter = 'grayscale(100%) opacity(0.3)';
            } else {
                document.getElementById('draw-btn').disabled = false;
                document.getElementById('limit-msg').style.display = 'none';
                deckContainer.style.filter = 'none';
            }
        }

        function startDramaticShuffle() {
            const btn = document.getElementById('draw-btn');
            btn.disabled = true;

            // シャッフル音再生[cite: 1]
            shuffleSound.currentTime = 0;
            shuffleSound.loop = true;
            shuffleSound.play();

            const cards = document.querySelectorAll('.card-back');
            cards.forEach((card, index) => {
                card.style.transform = `translate(0, 0) rotate(0deg) scale(1.2)`;
                setTimeout(() => {
                    card.classList.add('shuffling');
                    card.style.animationDuration = (0.6 + Math.random() * 0.4) + 's';
                }, 500 + (index * 20));
            });

            setTimeout(drawCard, 3000);
        }

        function drawCard() {
            shuffleSound.pause(); // シャッフル音停止[cite: 1]
            revealSound.currentTime = 0;
            revealSound.play(); // 決定音再生[cite: 1]

            const category = document.getElementById('category').value;
            const cardName = cardNames[Math.floor(Math.random() * cardNames.length)];
            const isReverse = Math.random() < 0.5;

            localStorage.setItem('tarot_' + category, new Date().toLocaleDateString());

            document.querySelector('.setup-section').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            document.getElementById('result-title').innerText = `${cardName} — ${isReverse ? '逆位置' : '正位置'}`;
            document.getElementById('diagnosis-text').innerText = `${category}の運命：\nこのカードは「${tarotData[cardName]}」を象徴しています。`;
            
            const imgElement = document.getElementById('card-image');
            imgElement.src = `${cardName}.png`;
            
            const advice = document.getElementById('advice-text');
            if (isReverse) {
                imgElement.classList.add('reverse');
                advice.innerText = "【啓示】現在は足元を見つめ直すべき時。急がず、内なる声に耳を傾けてください。";
            } else {
                imgElement.classList.remove('reverse');
                advice.innerText = "【神託】追い風が吹いています。自分の可能性を信じ、光差す方向へ進んでください。";
            }
        }
    </script>
</body>
</html>
