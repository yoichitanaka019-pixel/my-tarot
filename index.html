<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像対応タロット神託</title>

<style>
body{
margin:0;
padding:20px;
font-family:"Yu Gothic",sans-serif;
background:
radial-gradient(circle at top,#1a237e 0%,#090b16 60%);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:20px;
text-shadow:0 0 20px rgba(212,175,55,.6);
}

.panel{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

select,
button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
font-size:16px;
}

select{
background:#1f294f;
color:#fff;
}

button{
background:linear-gradient(135deg,#7c3aed,#ec4899);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#deck{
height:260px;
position:relative;
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
}

.card-back{
position:absolute;
width:75px;
height:130px;
border-radius:12px;
background-image:url("裏面.png");
background-size:cover;
background-position:center;
border:2px solid gold;
box-shadow:0 5px 20px rgba(0,0,0,.5);
transition:.5s;
}

.shuffle{
animation:shuffle .8s infinite ease-in-out;
}

@keyframes shuffle{
0%{transform:translate(0,0) rotate(0deg);}
25%{transform:translate(-120px,-40px) rotate(-90deg);}
50%{transform:translate(0,-80px) rotate(-180deg);}
75%{transform:translate(120px,-40px) rotate(-270deg);}
100%{transform:translate(0,0) rotate(-360deg);}
}

#result{
display:none;
margin-top:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card-area{
width:min(80vw,280px);
margin:0 auto;
position:relative;
}

.card-area::before{
content:"";
position:absolute;
inset:-20px;
background:radial-gradient(circle,rgba(212,175,55,.5),transparent 70%);
animation:pulse 3s infinite;
z-index:-1;
}

@keyframes pulse{
0%{transform:scale(.9);opacity:.6;}
50%{transform:scale(1.1);opacity:1;}
100%{transform:scale(.9);opacity:.6;}
}

#card-image{
width:100%;
border-radius:20px;
border:3px solid gold;
box-shadow:0 0 40px rgba(212,175,55,.5);
background:#111;
}

.reverse{
transform:rotate(180deg);
}

.textbox{
margin-top:20px;
background:rgba(0,0,0,.35);
padding:20px;
border-radius:16px;
line-height:1.9;
}

#advice{
display:block;
margin-top:16px;
color:#ffe58f;
font-weight:bold;
}

.special-sun{
animation:sunGlow 1.5s infinite alternate;
}

@keyframes sunGlow{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

.special-moon{
animation:moonFloat 4s ease-in-out infinite;
}

@keyframes moonFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.special-death{
animation:deathPulse 1s infinite alternate;
}

@keyframes deathPulse{
from{filter:hue-rotate(0deg);}
to{filter:hue-rotate(40deg);}
}

@media(max-width:768px){

body{
padding:12px;
}

.card-back{
width:60px;
height:105px;
}

h1{
font-size:1.8rem;
}

}
</style>
</head>

<body>

<div class="app">

<h1>✦ タロット神託 ✦</h1>

<div class="panel" id="setup">

<select id="category">
<option>恋愛</option>
<option>仕事</option>
<option>健康</option>
<option>家族</option>
<option>交友関係</option>
<option>ギャンブル</option>
</select>

<div id="deck"></div>

<button id="drawBtn" onclick="startFortune()">
運命を占う
</button>

</div>

<div id="result">

<div class="card-area">
<img id="card-image" src="" alt="tarot">
</div>

<div class="textbox">
<h2 id="title"></h2>
<p id="message"></p>
<small id="advice"></small>
</div>

<button onclick="resetFortune()">
もう一度占う
</button>

</div>

</div>

<script>

const cards = [
"愚者","魔術師","女教皇","女帝","皇帝","法王","恋人たち","戦車","正義","隠者",
"運命の輪","力","吊るされた男","死神","節制","悪魔","塔","星","月","太陽","審判","世界"
];


const messages = {
"愚者":{
"正位置":["新たな旅立ちの時です。未知の可能性があなたを待っています。","恐れず一歩を踏み出してください。"],
"逆位置":["軽率な判断が混乱を招きやすい暗示。","焦らず慎重に行動しましょう。"]
},
"魔術師":{
"正位置":["才能と行動力が運命を切り開きます。","自信を持って挑戦してください。"],
"逆位置":["迷いや自信不足が力を弱めています。","本来の能力を信じましょう。"]
},
"女教皇":{
"正位置":["静かな直感が真実を導いています。","感覚を信じてください。"],
"逆位置":["不安や誤解に惑わされやすい時期です。","冷静さを保ちましょう。"]
},
"女帝":{
"正位置":["愛情と豊かさに恵まれる兆し。","周囲との調和を大切に。"],
"逆位置":["甘えや依存が停滞を生みます。","自立心を意識してください。"]
},
"皇帝":{
"正位置":["責任感と統率力が成功へ繋がります。","堂々と前進しましょう。"],
"逆位置":["頑固さが対立を招く暗示。","柔軟な姿勢を忘れずに。"]
},
"法王":{
"正位置":["信頼できる導きが得られる時です。","誠実な選択をしてください。"],
"逆位置":["古い価値観に縛られています。","視野を広げてみましょう。"]
},
"恋人たち":{
"正位置":["心を揺さぶる出会いや選択の予感。","本音を大切にしてください。"],
"逆位置":["迷いやすく関係が不安定になりそうです。","曖昧な態度を避けましょう。"]
},
"戦車":{
"正位置":["勢いと情熱が成功を引き寄せます。","迷わず進んでください。"],
"逆位置":["焦りや暴走に注意が必要です。","一度立ち止まりましょう。"]
},
"正義":{
"正位置":["公平な結果が訪れる暗示です。","誠実さを貫いてください。"],
"逆位置":["偏った考えが問題を生みます。","客観性を意識してください。"]
},
"隠者":{
"正位置":["静かな内省が答えを導きます。","一人の時間を大切に。"],
"逆位置":["孤立感が強まりやすい時です。","信頼できる人に相談を。"]
},
"運命の輪":{
"正位置":["運命が大きく好転し始めています。","流れに乗ることが重要です。"],
"逆位置":["停滞やタイミングのズレを感じそうです。","焦らず機会を待ちましょう。"]
},
"力":{
"正位置":["精神力が困難を乗り越える鍵になります。","感情をコントロールしましょう。"],
"逆位置":["不安や怒りが暴走しやすい時期。","心を落ち着けてください。"]
},
"吊るされた男":{
"正位置":["忍耐が未来を変える重要な時です。","視点を変えてみましょう。"],
"逆位置":["無意味な我慢を続けている暗示。","執着を手放してください。"]
},
"死神":{
"正位置":["大きな終焉と再生の転換点です。","変化を受け入れましょう。"],
"逆位置":["過去への執着が未来を妨げています。","新しい流れへ進みましょう。"]
},
"節制":{
"正位置":["調和が運命を安定させています。","バランス感覚を大切に。"],
"逆位置":["極端な行動が問題を招きます。","生活リズムを整えましょう。"]
},
"悪魔":{
"正位置":["誘惑や執着が強まりやすい時。","冷静さを失わないでください。"],
"逆位置":["束縛から解放される兆しがあります。","勇気を持って行動を。"]
},
"塔":{
"正位置":["突然の変化が訪れる暗示です。","崩壊を恐れないでください。"],
"逆位置":["問題を先送りにしがちな時期。","現実と向き合いましょう。"]
},
"星":{
"正位置":["希望が未来を照らしています。","夢を諦めないでください。"],
"逆位置":["理想と現実の差に苦しみやすい時。","小さな希望を大切に。"]
},
"月":{
"正位置":["不安や幻想に惑わされやすい時期。","直感を信じてください。"],
"逆位置":["霧が晴れ真実が見え始めます。","現実を受け入れましょう。"]
},
"太陽":{
"正位置":["最高レベルの幸運期が訪れています。","自信を持って輝いてください。"],
"逆位置":["慢心や油断による失敗に注意。","感謝の心を忘れずに。"]
},
"審判":{
"正位置":["過去の努力が報われる時です。","結果を受け入れてください。"],
"逆位置":["未練が未来を止めています。","決断を先延ばしにしないで。"]
},
"世界":{
"正位置":["願望成就と完成の暗示です。","達成を素直に受け取りましょう。"],
"逆位置":["あと一歩で停滞しています。","最後まで気を抜かないで。"]
}
};

const categoryMessages = {
"恋愛":"恋愛運に変化が訪れています。",
"仕事":"仕事運に転機が近づいています。",
"健康":"生活習慣の見直しが必要です。",
"家族":"家族との絆が重要になります。",
"交友関係":"人間関係に変化が起こりそうです。",
"ギャンブル":"直感と冷静さの両立が必要です。"
};

function createDeck(){

const deck=document.getElementById("deck");

deck.innerHTML="";

for(let i=0;i<22;i++){

const card=document.createElement("div");

card.className="card-back";

const angle=(i-11)*5;
const x=(i-11)*10;

card.style.transform=
`translateX(${x}px) rotate(${angle}deg)`;

card.style.zIndex=i;

deck.appendChild(card);

}

}

createDeck();

function startFortune(){

document.getElementById("drawBtn").disabled=true;

const all=document.querySelectorAll(".card-back");

all.forEach((card,index)=>{
card.classList.add("shuffle");
card.style.animationDelay=`${index*0.03}s`;
});

setTimeout(drawCard,2500);

}

function drawCard(){

const category=
document.getElementById("category").value;

const card=
cards[Math.floor(Math.random()*cards.length)];

const reverse=
Math.random()<0.5;

const pos=
reverse ? "逆位置":"正位置";

const data=
messages[card][pos];

document.getElementById("setup").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("title").innerText=
`${card} — ${pos}`;

document.getElementById("message").innerText=
`${categoryMessages[category]}\n\n${data[0]}`;

document.getElementById("advice").innerText=
`【神託】${data[1]}`;

const img=
document.getElementById("card-image");

img.className="";

img.src=`${card}.png`;

img.onerror=function(){
this.src="裏面.png";
};

if(reverse){
img.classList.add("reverse");
}

if(card==="太陽"){
img.classList.add("special-sun");
}

if(card==="月"){
img.classList.add("special-moon");
}

if(card==="死神"){
img.classList.add("special-death");
}

}

function resetFortune(){

document.getElementById("result").style.display="none";

document.getElementById("setup").style.display="block";

document.getElementById("drawBtn").disabled=false;

createDeck();

}

</script>

</body>
</html>
