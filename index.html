<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像対応タロット神託</title>

<style>
body{
margin:0;
padding:20px;
font-family:"Yu Gothic",sans-serif;
background:
radial-gradient(circle at top,#1a237e 0%,#090b16 60%);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:20px;
text-shadow:0 0 20px rgba(212,175,55,.6);
}

.panel{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

select,
button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
font-size:16px;
}

select{
background:#1f294f;
color:#fff;
}

button{
background:linear-gradient(135deg,#7c3aed,#ec4899);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#deck{
height:260px;
position:relative;
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
}

.card-back{
position:absolute;
width:75px;
height:130px;
border-radius:12px;
background-image:url("裏面.png");
background-size:cover;
background-position:center;
border:2px solid gold;
box-shadow:0 5px 20px rgba(0,0,0,.5);
transition:.5s;
}

.shuffle{
animation:shuffle .8s infinite ease-in-out;
}

@keyframes shuffle{
0%{transform:translate(0,0) rotate(0deg);}
25%{transform:translate(-120px,-40px) rotate(-90deg);}
50%{transform:translate(0,-80px) rotate(-180deg);}
75%{transform:translate(120px,-40px) rotate(-270deg);}
100%{transform:translate(0,0) rotate(-360deg);}
}

#result{
display:none;
margin-top:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card-area{
width:min(80vw,280px);
margin:0 auto;
position:relative;
}

.card-area::before{
content:"";
position:absolute;
inset:-20px;
background:radial-gradient(circle,rgba(212,175,55,.5),transparent 70%);
animation:pulse 3s infinite;
z-index:-1;
}

@keyframes pulse{
0%{transform:scale(.9);opacity:.6;}
50%{transform:scale(1.1);opacity:1;}
100%{transform:scale(.9);opacity:.6;}
}

#card-image{
width:100%;
border-radius:20px;
border:3px solid gold;
box-shadow:0 0 40px rgba(212,175,55,.5);
background:#111;
}

.reverse{
transform:rotate(180deg);
}

.textbox{
margin-top:20px;
background:rgba(0,0,0,.35);
padding:20px;
border-radius:16px;
line-height:1.9;
}

#advice{
display:block;
margin-top:16px;
color:#ffe58f;
font-weight:bold;
}

.special-sun{
animation:sunGlow 1.5s infinite alternate;
}

@keyframes sunGlow{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

.special-moon{
animation:moonFloat 4s ease-in-out infinite;
}

@keyframes moonFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.special-death{
animation:deathPulse 1s infinite alternate;
}

@keyframes deathPulse{
from{filter:hue-rotate(0deg);}
to{filter:hue-rotate(40deg);}
}

@media(max-width:768px){

body{
padding:12px;
}

.card-back{
width:60px;
height:105px;
}

h1{
font-size:1.8rem;
}

}
</style>
</head>

<body>

<div class="app">

<h1>✦ タロット神託 ✦</h1>

<div class="panel" id="setup">

<select id="category">
<option>恋愛</option>
<option>仕事</option>
<option>健康</option>
<option>家族</option>
<option>交友関係</option>
<option>ギャンブル</option>
</select>

<div id="deck"></div>

<button id="drawBtn" onclick="startFortune()">
運命を占う
</button>

</div>

<div id="result">

<div class="card-area">
<img id="card-image" src="" alt="tarot">
</div>

<div class="textbox">
<h2 id="title"></h2>
<p id="message"></p>
<small id="advice"></small>
</div>

<button onclick="resetFortune()">
もう一度占う
</button>

</div>

</div>

<script>

const cards = [
"愚者","魔術師","女教皇","女帝","皇帝","教皇","恋人","戦車","正義","隠者",
"運命の輪","力","吊るされた男","死神","節制","悪魔","塔","星","月","太陽","審判","世界"
];

const messages = {
};

cards.forEach(card=>{
messages[card]={
"正位置":[`${card}があなたに光をもたらしています。`,`恐れず進んでください。`],
"逆位置":[`${card}が警告を示しています。`,`慎重な判断が必要です。`]
};
});

const categoryMessages = {
"恋愛":"恋愛運に変化が訪れています。",
"仕事":"仕事運に転機が近づいています。",
"健康":"生活習慣の見直しが必要です。",
"家族":"家族との絆が重要になります。",
"交友関係":"人間関係に変化が起こりそうです。",
"ギャンブル":"直感と冷静さの両立が必要です。"
};

function createDeck(){

const deck=document.getElementById("deck");

deck.innerHTML="";

for(let i=0;i<22;i++){

const card=document.createElement("div");

card.className="card-back";

const angle=(i-11)*5;
const x=(i-11)*10;

card.style.transform=
`translateX(${x}px) rotate(${angle}deg)`;

card.style.zIndex=i;

deck.appendChild(card);

}

}

createDeck();

function startFortune(){

document.getElementById("drawBtn").disabled=true;

const all=document.querySelectorAll(".card-back");

all.forEach((card,index)=>{
card.classList.add("shuffle");
card.style.animationDelay=`${index*0.03}s`;
});

setTimeout(drawCard,2500);

}

function drawCard(){

const category=
document.getElementById("category").value;

const card=
cards[Math.floor(Math.random()*cards.length)];

const reverse=
Math.random()<0.5;

const pos=
reverse ? "逆位置":"正位置";

const data=
messages[card][pos];

document.getElementById("setup").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("title").innerText=
`${card} — ${pos}`;

document.getElementById("message").innerText=
`${categoryMessages[category]}\n\n${data[0]}`;

document.getElementById("advice").innerText=
`【神託】${data[1]}`;

const img=
document.getElementById("card-image");

img.className="";

img.src=`${card}.png`;

img.onerror=function(){
this.src="裏面.png";
};

if(reverse){
img.classList.add("reverse");
}

if(card==="太陽"){
img.classList.add("special-sun");
}

if(card==="月"){
img.classList.add("special-moon");
}

if(card==="死神"){
img.classList.add("special-death");
}

}

function resetFortune(){

document.getElementById("result").style.display="none";

document.getElementById("setup").style.display="block";

document.getElementById("drawBtn").disabled=false;

createDeck();

}

</script>

</body>
</html>
