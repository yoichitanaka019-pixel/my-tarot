<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極タロット神託 修正版</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"Yu Gothic",sans-serif;
background:radial-gradient(circle at top,#1c2455 0%,#050816 70%);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
color:#fff;
}
.app{width:100%;max-width:580px}
.panel{
background:rgba(255,255,255,.06);
border-radius:28px;
padding:28px;
backdrop-filter:blur(12px);
}
.title{
text-align:center;
font-size:2rem;
margin-bottom:20px;
color:#f5d76e;
}
.select-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}
.category-btn{
padding:14px;
border:none;
border-radius:12px;
background:#1b2148;
color:#fff;
cursor:pointer;
font-weight:bold;
}
.category-btn.active{
background:linear-gradient(90deg,#7c3aed,#ec4899);
}
#deck{
position:relative;
height:240px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.card-back{
position:absolute;
width:80px;
height:140px;
border-radius:12px;
background:linear-gradient(135deg,#f5e7b2 0%,#cfb15b 30%,#7a5f1c 100%);
border:2px solid gold;
}
.card-back::before{
content:"✦";
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:rgba(0,0,0,.45);
}
.magic-chaos{
animation:chaos 4s ease-in-out infinite;
}
@keyframes chaos{
0%{transform:translate(0,0) rotate(0deg) scale(.5);opacity:0}
25%{opacity:1;transform:translate(var(--x1),var(--y1)) rotate(var(--r1))}
50%{transform:translate(var(--x2),var(--y2)) rotate(var(--r2))}
75%{transform:translate(var(--x3),var(--y3)) rotate(var(--r3))}
100%{transform:translate(var(--x4),var(--y4)) rotate(var(--r4));opacity:.2}
}
.main-btn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:16px;
font-size:1.1rem;
font-weight:bold;
background:linear-gradient(90deg,#7c3aed,#ec4899);
color:white;
cursor:pointer;
}
#result{display:none}
#card-image{
width:min(84vw,340px);
display:block;
margin:auto;
border-radius:20px;
border:3px solid gold;
}
.reverse{
transform:rotate(180deg);
}
.block{
margin-top:20px;
padding:22px;
background:rgba(0,0,0,.35);
border-radius:18px;
line-height:1.9;
}
.block h3{
color:#f5d76e;
margin-bottom:10px;
}

.card-title{
margin-top:20px;
text-align:center;
animation:titleReveal 1.2s ease;
}

.card-name{
font-size:2rem;
color:#f5d76e;
text-shadow:0 0 16px rgba(245,215,110,.8);
letter-spacing:.08em;
}

.card-position{
margin-top:8px;
font-size:1rem;
opacity:.9;
letter-spacing:.2em;
}

@keyframes titleReveal{
0%{
opacity:0;
transform:translateY(30px) scale(.8);
filter:blur(10px);
}
100%{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}
}

</style>
</head>

<body>

<div class="app">

<div class="panel" id="panel">

<h1 class="title">✦ 究極タロット神託 ✦</h1>

<div class="select-grid">
<button class="category-btn active" onclick="setCategory(this,'恋愛')">恋愛</button>
<button class="category-btn" onclick="setCategory(this,'仕事')">仕事</button>
<button class="category-btn" onclick="setCategory(this,'健康')">健康</button>
<button class="category-btn" onclick="setCategory(this,'家族')">家族</button>
<button class="category-btn" onclick="setCategory(this,'人間関係')">人間関係</button>
<button class="category-btn" onclick="setCategory(this,'ギャンブル')">ギャンブル</button>
</div>

<div id="deck"></div>

<button class="main-btn" onclick="startFortune()" id="drawBtn">
運命を占う
</button>

</div>

<div id="result">

<img id="card-image">

<div class="card-title">
<div class="card-name" id="card-name"></div>
<div class="card-position" id="card-position"></div>
</div>

<div class="block">
<h3>神託</h3>
<div id="oracle"></div>
</div>

<div class="block">
<h3>啓示</h3>
<div id="revelation"></div>
</div>

<button class="main-btn" onclick="resetFortune()">
もう一度占う
</button>

</div>

</div>

<script>

let selectedCategory = "恋愛";

function setCategory(el,cat){
selectedCategory = cat;
document.querySelectorAll(".category-btn")
.forEach(btn=>btn.classList.remove("active"));
el.classList.add("active");
}

const cards = [
"悪魔","隠者","運命の輪","愚者","月","皇帝","死神","女教皇","女帝",
"審判","世界","星","正義","節制","戦車","太陽","吊るされた男",
"塔","法王","魔術師","力","恋人たち"
];

const revelations = {

"悪魔":{
正位置:["欲望があなたを強く支配しています。しかしその誘惑の中に重要な学びが隠されています。"],
逆位置:["執着や依存から解放される兆しがあります。"]
},

"隠者":{
正位置:["静寂の中に真実があります。一人の時間が未来を照らします。"],
逆位置:["孤立しすぎることで視野が狭くなっています。"]
},

"運命の輪":{
正位置:["運命の歯車が回り始めています。偶然に見える出来事が未来を変えるでしょう。"],
逆位置:["流れに逆らうほど停滞が強まります。"]
},

"愚者":{
正位置:["未知への旅が始まります。恐れより好奇心を信じてください。"],
逆位置:["無計画な行動が混乱を招いています。"]
},

"月":{
正位置:["見えない不安が心を揺らしています。本質を見極めてください。"],
逆位置:["隠されていた真実が明らかになろうとしています。"]
},

"皇帝":{
正位置:["強い意志と責任感が成功を引き寄せます。"],
逆位置:["支配欲や頑固さが運気を乱しています。"]
},

"死神":{
正位置:["終わりは新たな始まりです。古い流れを手放してください。"],
逆位置:["変化への恐れが未来を停滞させています。"]
},

"女教皇":{
正位置:["静かな直感が正しい答えを示しています。"],
逆位置:["疑いや迷いが真実を曇らせています。"]
},

"女帝":{
正位置:["愛と豊かさがあなたへ流れ込んでいます。"],
逆位置:["感情の乱れが運気へ影響しています。"]
},

"審判":{
正位置:["過去の努力が報われる時です。"],
逆位置:["後悔が未来への扉を閉ざしています。"]
},

"世界":{
正位置:["長い旅が完成へ向かっています。"],
逆位置:["未完成の課題が停滞を招いています。"]
},

"星":{
正位置:["希望の光が未来を照らしています。"],
逆位置:["悲観的な思考が幸運を遠ざけています。"]
},

"正義":{
正位置:["誠実さが正しい結果を引き寄せます。"],
逆位置:["偏った視点が誤った判断を招いています。"]
},

"節制":{
正位置:["調和とバランスが未来を安定させます。"],
逆位置:["極端な行動が心身を乱しています。"]
},

"戦車":{
正位置:["強い意志が障害を突破します。"],
逆位置:["焦りによる暴走に注意してください。"]
},

"太陽":{
正位置:["最高の幸運期が訪れています。"],
逆位置:["油断や慢心が運気低下を招いています。"]
},

"吊るされた男":{
正位置:["視点を変えることで真実が見えてきます。"],
逆位置:["無意味な我慢を続けていないか見直してください。"]
},

"塔":{
正位置:["突然の変化が新たな未来を呼び込みます。"],
逆位置:["崩壊を恐れるほど変化は大きくなります。"]
},

"法王":{
正位置:["精神的な学びがあなたを成長させます。"],
逆位置:["古い価値観に縛られすぎています。"]
},

"魔術師":{
正位置:["あなたの才能が現実を動かし始めています。"],
逆位置:["迷いが本来の能力を弱めています。"]
},

"力":{
正位置:["優しさと精神力が困難を乗り越えます。"],
逆位置:["自信喪失が力を弱めています。"]
},

"恋人たち":{
正位置:["運命的な選択が訪れています。"],
逆位置:["迷いや優柔不断が未来を曇らせています。"]
}

};

const fortunes = {
恋愛:{
正位置:["運命的な引き寄せが始まっています。"],
逆位置:["すれ違いに注意してください。"]
},
仕事:{
正位置:["努力が成功へつながっています。"],
逆位置:["焦りによるミスに注意してください。"]
},
健康:{
正位置:["回復運が高まっています。"],
逆位置:["無理を重ねすぎています。"]
},
家族:{
正位置:["家族との絆が深まります。"],
逆位置:["感情的な衝突に注意してください。"]
},
人間関係:{
正位置:["信頼できる縁が強まります。"],
逆位置:["誤解が生まれやすい時期です。"]
},
ギャンブル:{
正位置:["直感が冴えています。"],
逆位置:["熱くなりすぎないでください。"]
}
};

function rand(min,max){
return Math.floor(Math.random()*(max-min)+min);
}

function createDeck(){

const deck = document.getElementById("deck");
deck.innerHTML = "";

for(let i=0;i<22;i++){

const card = document.createElement("div");
card.className = "card-back";

card.style.left = "45%";
card.style.top = "25%";
card.style.transform = `rotate(${(i-11)*4}deg)`;

deck.appendChild(card);

}

}

createDeck();

function startFortune(){

document.getElementById("drawBtn").disabled = true;

document.querySelectorAll(".card-back").forEach(card=>{

card.classList.add("magic-chaos");

card.style.setProperty("--x1",rand(-140,140)+"px");
card.style.setProperty("--y1",rand(-100,100)+"px");
card.style.setProperty("--r1",rand(-180,180)+"deg");

card.style.setProperty("--x2",rand(-180,180)+"px");
card.style.setProperty("--y2",rand(-120,120)+"px");
card.style.setProperty("--r2",rand(-260,260)+"deg");

card.style.setProperty("--x3",rand(-190,190)+"px");
card.style.setProperty("--y3",rand(-130,130)+"px");
card.style.setProperty("--r3",rand(-360,360)+"deg");

card.style.setProperty("--x4",rand(-210,210)+"px");
card.style.setProperty("--y4",rand(-150,150)+"px");
card.style.setProperty("--r4",rand(-540,540)+"deg");

});

setTimeout(drawCard,4000);

}

function drawCard(){

const card = cards[Math.floor(Math.random()*cards.length)];
const reverse = Math.random() < 0.5;

document.getElementById("panel").style.display = "none";
document.getElementById("result").style.display = "block";

const img = document.getElementById("card-image");

img.className = "";

img.src = encodeURIComponent(card)+".png";

if(reverse){
img.classList.add("reverse");
}

document.getElementById("card-name").innerText = card;
document.getElementById("card-position").innerText = type;

const type = reverse ? "逆位置" : "正位置";

const oracleData = fortunes[selectedCategory][type];
const oracleText = oracleData[Math.floor(Math.random()*oracleData.length)];

document.getElementById("oracle").innerHTML = oracleText;

const revelationData = revelations[card][type];
const revelationText = revelationData[Math.floor(Math.random()*revelationData.length)];

document.getElementById("revelation").innerHTML = revelationText;

}

function resetFortune(){

document.getElementById("result").style.display = "none";
document.getElementById("panel").style.display = "block";

document.getElementById("drawBtn").disabled = false;

createDeck();

}

</script>

</body>
</html>
