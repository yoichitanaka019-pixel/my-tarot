<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>究極タロット神託</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Yu Gothic',sans-serif;background:radial-gradient(circle at top,#1c2455 0%,#050816 70%);min-height:100vh;display:flex;justify-content:center;padding:20px;color:#fff}.app{width:100%;max-width:580px}.panel{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border-radius:28px;padding:28px;box-shadow:0 0 50px rgba(0,0,0,.55)}.title{text-align:center;font-size:2rem;margin-bottom:24px;color:#f5d76e}.select-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}.category-btn{padding:14px;border:none;border-radius:14px;font-size:1rem;font-weight:bold;cursor:pointer;background:#1a2144;color:#fff}.category-btn.active{background:linear-gradient(90deg,#7c3aed,#ec4899)}#deck{position:relative;height:260px;display:flex;justify-content:center;align-items:center;overflow:hidden}.card-back{position:absolute;width:82px;height:145px;border-radius:14px;background:linear-gradient(135deg,#f5e7b2 0%,#cfb15b 30%,#7a5f1c 100%);border:2px solid #ffd700}.card-back::before{content:'✦';position:absolute;inset:0;display:flex;justify-content:center;align-items:center;font-size:34px;color:rgba(0,0,0,.45)}.magic-chaos{animation:magicChaos 4s ease-in-out infinite}@keyframes magicChaos{0%{transform:translate(0,0) rotate(0deg) scale(.5);opacity:0}25%{opacity:1;transform:translate(var(--x1),var(--y1)) rotate(var(--r1)) scale(1)}50%{transform:translate(var(--x2),var(--y2)) rotate(var(--r2)) scale(1.15)}75%{transform:translate(var(--x3),var(--y3)) rotate(var(--r3)) scale(1)}100%{transform:translate(var(--x4),var(--y4)) rotate(var(--r4)) scale(.7);opacity:.2}}button.main{width:100%;padding:18px;margin-top:20px;border:none;border-radius:16px;font-size:1.15rem;font-weight:bold;cursor:pointer;color:#fff;background:linear-gradient(90deg,#7c3aed,#ec4899)}#result{display:none;margin-top:24px}#card-image{width:min(84vw,340px);display:block;margin:auto;border-radius:20px;border:3px solid gold}.reverse{transform:rotate(180deg)}.block{margin-top:20px;padding:24px;border-radius:20px;background:rgba(0,0,0,.35);line-height:1.9}.block h3{margin-bottom:12px;color:#f5d76e}</style></head><body><div class='app'><div class='panel' id='panel'><h1 class='title'>✦ 究極タロット神託 ✦</h1><div class='select-grid'><button class='category-btn active' onclick="setCategory(this,'恋愛')">恋愛</button><button class='category-btn' onclick="setCategory(this,'仕事')">仕事</button><button class='category-btn' onclick="setCategory(this,'健康')">健康</button><button class='category-btn' onclick="setCategory(this,'家族')">家族</button><button class='category-btn' onclick="setCategory(this,'人間関係')">人間関係</button><button class='category-btn' onclick="setCategory(this,'ギャンブル')">ギャンブル</button></div><div id='deck'></div><button class='main' onclick='startFortune()' id='drawBtn'>運命を占う</button></div><div id='result'><img id='card-image'><div class='block'><h3>神託</h3><div id='oracle'></div></div><div class='block'><h3>啓示</h3><div id='revelation'></div></div><button class='main' onclick='resetFortune()'>もう一度占う</button></div></div><script>let selectedCategory='恋愛';function setCategory(el,cat){selectedCategory=cat;document.querySelectorAll('.category-btn').forEach(btn=>btn.classList.remove('active'));el.classList.add('active')}const cards=['悪魔','隠者','運命の輪','愚者','月','皇帝','死神','女教皇','女帝','審判','世界','星','正義','節制','戦車','太陽','吊るされた男','塔','法王','魔術師','力','恋人たち'];const fortunes={恋愛:{正位置:['心の距離が近づき、運命的な引き寄せが始まります。','過去に停滞していた恋愛運が動き出します。'],逆位置:['不安や執着が判断を曇らせています。','すれ違いや誤解が起こりやすい時期です。']},仕事:{正位置:['努力が周囲に認められ、大きな転機が近づいています。','新しい役割が才能を開花させます。'],逆位置:['焦りによる判断ミスに注意が必要です。','周囲との温度差がストレスになりそうです。']},健康:{正位置:['心身のバランスが整い始めています。','回復運が高まっています。'],逆位置:['無理を重ねることで疲労が蓄積しています。','心の疲れが身体へ影響しています。']},家族:{正位置:['家族との絆が深まります。','家庭内の問題に解決の兆しがあります。'],逆位置:['感情的な衝突が起こりやすい時期です。','過去のわだかまりが再浮上する暗示があります。']},人間関係:{正位置:['信頼できる縁が強まります。','新しい出会いが運気を変化させます。'],逆位置:['表面的な関係に疲れを感じやすい時期です。','誤解や嫉妬が生まれやすい暗示があります。']},ギャンブル:{正位置:['直感が冴えています。','流れがあなたへ味方しています。'],逆位置:['感情で動くと損失が膨らみやすい時です。','欲望に飲み込まれる暗示があります。']}};function rand(min,max){return Math.floor(Math.random()*(max-min)+min)}function createDeck(){const deck=document.getElementById('deck');deck.innerHTML='';for(let i=0;i<22;i++){const card=document.createElement('div');card.className='card-back';card.style.left='45%';card.style.top='25%';card.style.transform=`rotate(${(i-11)*4}deg)`;deck.appendChild(card)}}createDeck();function startFortune(){document.getElementById('drawBtn').disabled=true;document.querySelectorAll('.card-back').forEach(card=>{card.classList.add('magic-chaos');card.style.setProperty('--x1',rand(-140,140)+'px');card.style.setProperty('--y1',rand(-100,100)+'px');card.style.setProperty('--r1',rand(-180,180)+'deg');card.style.setProperty('--x2',rand(-180,180)+'px');card.style.setProperty('--y2',rand(-120,120)+'px');card.style.setProperty('--r2',rand(-260,260)+'deg');card.style.setProperty('--x3',rand(-190,190)+'px');card.style.setProperty('--y3',rand(-130,130)+'px');card.style.setProperty('--r3',rand(-360,360)+'deg');card.style.setProperty('--x4',rand(-210,210)+'px');card.style.setProperty('--y4',rand(-150,150)+'px');card.style.setProperty('--r4',rand(-540,540)+'deg')});setTimeout(drawCard,4000)}function drawCard(){const card=cards[Math.floor(Math.random()*cards.length)];const reverse=Math.random()<0.5;document.getElementById('panel').style.display='none';document.getElementById('result').style.display='block';const img=document.getElementById('card-image');img.className='';img.src=encodeURIComponent(card)+'.png';if(reverse){img.classList.add('reverse')}const type=reverse?'逆位置':'正位置';const data=fortunes[selectedCategory][reverse?'逆位置':'正位置'];const text=data[Math.floor(Math.random()*data.length)];document.getElementById('oracle').innerHTML='<strong>'+card+' '+type+'</strong><br><br>'+text;
const revData = revelations[card][reverse ? "逆位置" : "正位置"];
const revText = revData[Math.floor(Math.random() * revData.length)];

document.getElementById('revelation').innerHTML =
"<strong>" + card + " " + type + "</strong><br><br>" + revText;
}function resetFortune(){document.getElementById('result').style.display='none';document.getElementById('panel').style.display='block';document.getElementById('drawBtn').disabled=false;createDeck()}</script></body></html>
