<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘のタロット占い</title>
    <style>
        :root { --main-bg: #1a1a2e; --card-bg: #16213e; --accent: #e94560; --text: #ffffff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--main-bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; }
        .setup-section { width: 100%; max-width: 400px; text-align: center; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 1rem; }
        button { background-color: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #result-area { margin-top: 30px; display: none; text-align: center; animation: fadeIn 0.5s ease-in; }
        .card-container { width: 200px; height: 350px; margin: 20px auto; perspective: 1000px; }
        #card-image { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 3px solid #fff; box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); background-color: #333; }
        .reverse { transform: rotate(180deg); }
        .diagnosis-box { background: var(--card-bg); padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent); text-align: left; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>🔮 神秘のタロット占い</h1>

    <div class="setup-section">
        <label for="category">占いたい項目を選んでください</label>
        <select id="category">
            <option value="恋愛">恋愛</option>
            <option value="仕事">仕事</option>
            <option value="健康">健康</option>
            <option value="家族">家族</option>
            <option value="交友関係">交友関係</option>
            <option value="ギャンブル">ギャンブル</option>
        </select>
        <button onclick="drawCard()">カードを引く</button>
    </div>

    <div id="result-area">
        <h2 id="result-title"></h2>
        <div class="card-container">
            <img id="card-image" src="" alt="タロットカード">
        </div>
        <div class="diagnosis-box">
            <p id="diagnosis-text"></p>
            <small id="advice-text" style="color: #bbb;"></small>
        </div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--accent); margin-top:20px;">もう一度占う</button>
    </div>

    <script>
        const tarotData = {
            "愚者": { "恋愛": "自由な恋の始まり。直感で動いて。", "仕事": "新しいプロジェクトの予感。", "健康": "快調ですが不注意に注意。", "家族": "気楽な関係が吉。", "交友関係": "新しい友人が増えます。", "ギャンブル": "ビギナーズラックあり。" },
            "魔術師": { "恋愛": "知的なアプローチが成功します。", "仕事": "才能を発揮できる好機。", "健康": "活力に溢れています。", "家族": "会話が弾む時期。", "交友関係": "人気運が高まります。", "ギャンブル": "戦略勝ちの予感。" },
            "太陽": { "恋愛": "明るく幸せな関係。祝福されます。", "仕事": "大きな成功。周囲に認められます。", "健康": "エネルギー満タンです。", "家族": "笑顔の絶えない家庭。", "交友関係": "注目の的になります。", "ギャンブル": "大勝のチャンス！" },
            "世界": { "恋愛": "最高の相性。結ばれる時。", "仕事": "目標達成。完璧な成果。", "健康": "心身ともに最高潮。", "家族": "最高の絆。", "交友関係": "素晴らしい仲間に恵まれます。", "ギャンブル": "完全勝利の予感。" }
            // 必要に応じて他の22枚を追加
        };

        const cardNames = ["愚者", "魔術師", "太陽", "世界"]; // 画像があるカード名

        function drawCard() {
            const category = document.getElementById('category').value;
            const cardName = cardNames[Math.floor(Math.random() * cardNames.length)];
            const isReverse = Math.random() < 0.5;

            // 表示の切り替え
            document.querySelector('.setup-section').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            // 結果の設定
            document.getElementById('result-title').innerText = `${cardName} (${isReverse ? '逆位置' : '正位置'})`;
            document.getElementById('diagnosis-text').innerText = tarotData[cardName][category];
            
            // 画像の設定
            const imgElement = document.getElementById('card-image');
            imgElement.src = `${cardName}.png`; // ここでローカル画像を参照
            if (isReverse) {
                imgElement.classList.add('reverse');
                document.getElementById('advice-text').innerText = "※逆位置：今は少し慎重になり、計画を見直すと吉です。";
            } else {
                imgElement.classList.remove('reverse');
                document.getElementById('advice-text').innerText = "";
            }
        }
    </script>
</body>
</html>
