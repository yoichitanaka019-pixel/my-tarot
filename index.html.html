<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極タロット神託</title>

<style>
:root{
--bg:#070b18;
--gold:#d4af37;
--accent:#8b5cf6;
--text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Yu Gothic",sans-serif;
background:
radial-gradient(circle at top,#1b2150 0%,#070b18 60%);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
overflow-x:hidden;
}

h1{
margin:20px 0;
font-size:2.2rem;
color:var(--gold);
text-shadow:0 0 20px rgba(212,175,55,.7);
text-align:center;
}

.setup-section,
#result-area{
width:100%;
max-width:520px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

label{
display:block;
margin-bottom:10px;
font-size:1.05rem;
}

select,
button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:1rem;
}

select{
background:#1d2448;
color:white;
}

button{
background:linear-gradient(135deg,#8b5cf6,#ec4899);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#deck-container{
position:relative;
height:300px;
display:flex;
justify-content:center;
align-items:center;
perspective:2000px;
margin-top:10px;
}

.card-back{
position:absolute;
width:80px;
height:140px;
background:linear-gradient(135deg,#222,#555);
border:2px solid var(--gold);
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.5);
transition:.6s;
}

.shuffling{
animation:shuffle .7s infinite ease-in-out;
}

@keyframes shuffle{
0%{transform:translate(0,0) rotate(0deg);}
25%{transform:translate(-140px,-40px) rotate(-90deg);}
50%{transform:translate(0,-90px) rotate(-180deg);}
75%{transform:translate(140px,-40px) rotate(-270deg);}
100%{transform:translate(0,0) rotate(-360deg);}
}

#result-area{
display:none;
margin-top:20px;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.card-container{
width:min(75vw,280px);
margin:20px auto;
}

#card-image{
width:100%;
border-radius:18px;
border:3px solid var(--gold);
box-shadow:0 0 40px rgba(212,175,55,.5);
background:#111;
}

.reverse{
transform:rotate(180deg);
}

.diagnosis-box{
margin-top:20px;
background:rgba(0,0,0,.35);
padding:20px;
border-radius:16px;
line-height:1.9;
text-align:left;
}

#advice-text{
display:block;
margin-top:15px;
color:#ffe58f;
font-weight:bold;
}

.special-sun{
animation:sunGlow 1.5s infinite alternate;
}

@keyframes sunGlow{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

.special-moon{
animation:moonFloat 4s ease-in-out infinite;
}

@keyframes moonFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.special-death{
animation:deathPulse 1s infinite alternate;
}

@keyframes deathPulse{
from{filter:hue-rotate(0deg);}
to{filter:hue-rotate(35deg);}
}

@media(max-width:768px){

.card-back{
width:60px;
height:105px;
}

h1{
font-size:1.8rem;
}

body{
padding:12px;
}

}
</style>
</head>

<body>

<div class="setup-section">

<label>占いたいカテゴリを選択</label>

<option value="仕事">仕事</option>
<option value="健康">健康</option>

</select>

<div id="deck-container"></div>

<button id="drawBtn" onclick="startShuffle()">
運命をシャッフルする
</button>

</div>

<div id="result-area">

<h2 id="result-title"></h2>

<div class="card-container">
<img id="card-image" src="" alt="tarot">
</div>

<div class="diagnosis-box">
<p id="diagnosis-text"></p>
<small id="advice-text"></small>

<button onclick="resetFortune()" style="margin-top:20px;">

const categoryMessage = {
"恋愛":"恋愛運に大きな流れが訪れています。",
"仕事":"仕事運が変化し始めています。",
"健康":"生活リズムの見直しが鍵です。",
"家族":"家族との関係が重要な時期です。",
"交友関係":"人間関係に変化の兆しがあります。",
"ギャンブル":"直感と冷静さの両立が必要です。"
};

window.onload = createDeck;

function createDeck(){

const container = document.getElementById("deck-container");
container.innerHTML = "";

for(let i=0;i<22;i++){

const card = document.createElement("div");

card.className = "card-back";

const angle = (i-11)*5;
const x = (i-11)*12;

card.style.transform =
`translateX(${x}px) rotate(${angle}deg)`;

card.style.zIndex = i;

container.appendChild(card);

}

}

function startShuffle(){

document.getElementById("drawBtn").disabled = true;

const deck = document.querySelectorAll(".card-back");

deck.forEach((card,index)=>{

card.classList.add("shuffling");

card.style.animationDelay = `${index*0.03}s`;

});

setTimeout(drawCard,3000);

}

function drawCard(){

const category =
document.getElementById("category").value;

const card =
cards[Math.floor(Math.random()*cards.length)];

const reverse = Math.random()<0.5;

const position =
reverse ? "逆位置" : "正位置";

document.querySelector(".setup-section").style.display="none";

document.getElementById("result-area").style.display="block";

document.getElementById("result-title").innerText =
`${card} — ${position}`;

const data = fortuneData[card][position];

document.getElementById("diagnosis-text").innerText =
`${categoryMessage[category]}\n\n${data.text}`;

document.getElementById("advice-text").innerText =
`【神託】${data.advice}`;

const img = document.getElementById("card-image");

img.className = "";

img.src = `${card}.png`;

if(reverse){
img.classList.add("reverse");
}

if(card==="太陽"){
img.classList.add("special-sun");
}

if(card==="月"){
img.classList.add("special-moon");
}

if(card==="死神"){
img.classList.add("special-death");
}

}

function resetFortune(){

document.getElementById("result-area").style.display="none";

document.querySelector(".setup-section").style.display="block";

document.getElementById("drawBtn").disabled = false;

createDeck();

}
